<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Challenge 20260422</title>
</head>

<body>
    <button onclick="main()">Run Main</button>

    <script>
        let previousItem;

        function main() {
            // First test
            let result = getCleanupScore(["bottle", "straw", "shoe", "battery"]);
            console.log(`First test: ${result}, is ${result === 44}`);

            // Second test
            result = getCleanupScore(["electronics", "straw", "newspaper", "bottle", "bag"]);
            console.log(`Second test: ${result}, is ${result === 58}`);

            // Third test
            result = getCleanupScore(["shoe", "can", "can", "can", "bottle", "bottle", "straw", "straw", "straw"]);
            console.log(`Third test: ${result}, is ${result === 79}`);

            // Fourth test
            result = getCleanupScore(["mattress", ["rare", 80], "tire", "tire", "tire", ["rare", 95]]);
            console.log(`Fourth test: ${result}, is ${result === 358}`);
            
            // Fifth test
            result = getCleanupScore(["bottle", "can", "can", "shoe", "shoe", ["rare", 56], "bottle", "bottle", "can", "can", "electronics", "bottle", ["rare", 48], "bottle", "can", "can", "can", "can", "can", "can", "can"]);
            console.log(`Fifth test: ${result}, is ${result === 383}`);
        }

        function getCleanupScore(items) {

            let sum = 0;

            for (let i = 0; i < items.length; i++) {
                let currentItem = items[i];

                // rare item
                if (currentItem.isArray) {
                    sum += currentItem[0];
                    previousItem = undefined;
                    continue;
                }

                let itemTotalValue = getNormalItemPoints(currentItem);

                if (previousItem !== undefined) {
                    if (previousItem.item === currentItem) {
                        itemTotalValue += previousItem.bonusTimes;
                        previousItem.bonusTimes++;
                    } else {
                        previousItem = {item: currentItem, bonusTimes: 0};
                    }
                }

                let fifthItemBonus = 1;

                if ((i + 1) % 5 === 0) {
                    fifthItemBonus = i / 5 + 1;
                }

                sum += itemTotalValue * fifthItemBonus;
                if (previousItem === undefined) {
                    previousItem = {item: currentItem, bonusTimes: 0};
                }
            }

            return sum;
        }

        function getNormalItemPoints(item) {
            switch (item) {
                case "bottle":
                    return 10;
                case "can":
                    return 6;
                case "bag":
                    return 8;
                case "tire":
                    return 35;
                case "straw":
                    return 4;
                case "cardboard":
                    return 3;
                case "newspaper":
                    return 3;
                case "shoe":
                    return 12;
                case "electronics":
                    return 25;
                case "battery":
                    return 18;
                case "mattress":
                    return 38;
            }
        }
    </script>
</body>

</html>
